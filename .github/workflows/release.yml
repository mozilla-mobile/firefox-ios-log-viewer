name: Build & Release

# Manually triggered. Each run computes the next version (minor bump), builds
# the self-contained single-file HTML app, and publishes a GitHub Release with
# the HTML attached as a download.
on:
  workflow_dispatch:

# Needed to create tags/releases with the built-in GITHUB_TOKEN.
permissions:
  contents: write

# Never run two releases at once — they would race on the version number.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest # pure web build — no macOS/Rust needed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute next version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Version scheme: 0.MINOR.0, starting at 0.1.0 and bumping the minor
          # on every run, derived from the latest published release.
          #
          # NOTE: on a 404 (no releases yet) `gh api --jq` still prints the raw
          # error JSON to stdout, so a plain emptiness check is not enough — we
          # only trust a value that looks like a semver tag, else start at 0.1.0.
          latest=$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" \
            --jq .tag_name 2>/dev/null || true)
          if [[ "$latest" =~ ^v?([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major=${BASH_REMATCH[1]}
            minor=${BASH_REMATCH[2]}
            next="${major}.$((minor + 1)).0"
          else
            next="0.1.0"
          fi
          echo "Latest release: ${latest:-<none>} -> next: $next"
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "tag=v$next" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build single-file HTML
        run: npm run build

      - name: Stage release asset
        id: asset
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          asset="firefox-ios-log-viewer-${VERSION}.html"
          cp dist/index.html "$asset"
          echo "Staged $asset ($(wc -c < "$asset") bytes)"
          echo "path=$asset" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          ASSET: ${{ steps.asset.outputs.path }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --title "$TAG" \
            --target "$GITHUB_SHA" \
            --generate-notes \
            "$ASSET"
